name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

env:
  APP_NAME: ogmara

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: windows
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            label: linux
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macos-arm64

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target

      # Linux: install system dependencies for Tauri/webkit2gtk
      - name: Install Linux dependencies
        if: matrix.label == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      # Clone and build the SDK (not published to npm, referenced as file:../sdk-js)
      - name: Clone and build SDK
        shell: bash
        run: |
          git clone --depth 1 https://github.com/Ogmara/sdk-js.git ../sdk-js
          cd ../sdk-js
          npm ci
          npm run build

      - name: Read version
        id: version
        shell: bash
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Install npm dependencies
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: --target ${{ matrix.target }}

      # Rename artifacts to include -beta and version
      - name: Rename artifacts (Windows)
        if: matrix.label == 'windows'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          if [ -d nsis ]; then
            for f in nsis/*.exe; do
              mv "$f" "nsis/${APP_NAME}-${VERSION}-beta-windows-setup.exe"
            done
          fi
          if [ -d msi ]; then
            for f in msi/*.msi; do
              mv "$f" "msi/${APP_NAME}-${VERSION}-beta-windows.msi"
            done
          fi

      - name: Rename artifacts (Linux)
        if: matrix.label == 'linux'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          if [ -d appimage ]; then
            for f in appimage/*.AppImage; do
              mv "$f" "appimage/${APP_NAME}-${VERSION}-beta-linux-x86_64.AppImage"
            done
          fi
          if [ -d deb ]; then
            for f in deb/*.deb; do
              mv "$f" "deb/${APP_NAME}-${VERSION}-beta-linux-amd64.deb"
            done
          fi

      - name: Rename artifacts (macOS)
        if: matrix.label == 'macos-arm64'
        shell: bash
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          cd src-tauri/target/${{ matrix.target }}/release/bundle
          if [ -d dmg ]; then
            for f in dmg/*.dmg; do
              mv "$f" "dmg/${APP_NAME}-${VERSION}-beta-macos-arm64.dmg"
            done
          fi

      # Upload artifacts (available in Actions tab)
      - name: Upload Windows artifacts
        if: matrix.label == 'windows'
        uses: actions/upload-artifact@v4
        with:
          name: ogmara-${{ steps.version.outputs.version }}-beta-windows
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/msi/*.msi

      - name: Upload Linux artifacts
        if: matrix.label == 'linux'
        uses: actions/upload-artifact@v4
        with:
          name: ogmara-${{ steps.version.outputs.version }}-beta-linux
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb

      - name: Upload macOS artifacts
        if: matrix.label == 'macos-arm64'
        uses: actions/upload-artifact@v4
        with:
          name: ogmara-${{ steps.version.outputs.version }}-beta-macos
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg

  # Create GitHub Release after all builds complete
  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Ogmara Desktop v${{ steps.version.outputs.version }} (Beta)
          tag_name: ${{ github.ref_name }}
          prerelease: true
          generate_release_notes: true
          body: |
            ## Ogmara Desktop v${{ steps.version.outputs.version }} — Beta Release

            Decentralized chat and news on Klever blockchain. Standalone wallet, no browser extension needed.

            ### Downloads
            | Platform | File |
            |----------|------|
            | Windows (installer) | `ogmara-${{ steps.version.outputs.version }}-beta-windows-setup.exe` |
            | Windows (MSI) | `ogmara-${{ steps.version.outputs.version }}-beta-windows.msi` |
            | Linux (AppImage) | `ogmara-${{ steps.version.outputs.version }}-beta-linux-x86_64.AppImage` |
            | Linux (deb) | `ogmara-${{ steps.version.outputs.version }}-beta-linux-amd64.deb` |
            | macOS (DMG) | `ogmara-${{ steps.version.outputs.version }}-beta-macos-arm64.dmg` |

            > **Beta:** This is a pre-release for testing. Report issues at [Ogmara/desktop](https://github.com/Ogmara/desktop/issues).
          files: |
            artifacts/**/*.exe
            artifacts/**/*.msi
            artifacts/**/*.AppImage
            artifacts/**/*.deb
            artifacts/**/*.dmg
